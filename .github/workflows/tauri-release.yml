name: Tauri Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: fallen-world-launcher
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fallen-world-launcher/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: fallen-world-launcher

      - name: Install JS deps
        run: npm ci

      - name: Build Tauri app (Windows)
        run: npm run tauri build

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows
          path: |
            fallen-world-launcher/target/release/bundle/nsis/*.exe
            fallen-world-launcher/target/release/bundle/msi/*.msi

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: fallen-world-launcher
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fallen-world-launcher/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: fallen-world-launcher

      - name: Install JS deps
        run: npm ci

      - name: Build Tauri app (Linux)
        run: npm run tauri build

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-linux
          path: |
            fallen-world-launcher/target/release/bundle/appimage/*.AppImage
            fallen-world-launcher/target/release/bundle/deb/*.deb

  release:
    name: Publish Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: launcher-windows
          path: dist/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: launcher-linux
          path: dist/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/**/*.exe
            dist/windows/**/*.msi
            dist/linux/**/*.AppImage
            dist/linux/**/*.deb
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
